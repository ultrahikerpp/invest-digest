<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultra Investment Digest｜財經投資頻道重點摘要</title>
  <link rel="alternate" type="application/rss+xml" title="Ultra Investment Digest RSS" href="feed.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    rel="stylesheet">
  <!-- Prevent flash of wrong theme -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var theme = (saved === 'light' || saved === 'dark')
        ? saved
        : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
  <style>
    /* ─────────────────────────────────────────────────────────
       Design System: Gen Z Dark Gradient
       Colours match card_generator.py exactly:
         C_BG   = #080A1A  C_BG2  = #160C32
         C_VIBE1= #6366F1  C_VIBE2= #A855F7  C_VIBE3= #EC4899
       Typography modular scale (Major Third 1.250):
         12 · 13 · 14 · 16 · 17 · 20 · 24 · 28
    ───────────────────────────────────────────────────────── */

    /* ── Dark mode (default) ── */
    :root {
      --bg: #080A1A;
      --bg2: #160C32;
      --surface: #10122A;
      --surface2: #0D0F22;

      --border: rgba(99, 102, 241, 0.18);
      --border-hover: rgba(168, 85, 247, 0.45);

      --vibe1: #6366F1;
      --vibe2: #A855F7;
      --vibe3: #EC4899;
      --vibe1-lt: rgba(99, 102, 241, 0.14);
      --vibe1-dk: #4F46E5;

      --primary: #6366F1;
      --primary-lt: rgba(99, 102, 241, 0.14);
      --primary-dk: #4F46E5;

      --text: #F1F5F9;
      --text-muted: #94A3B8;
      --text-dim: #64748B;

      --green: #10B981;
      --green-lt: rgba(16, 185, 129, 0.12);
      --red: #F43F5E;
      --red-lt: rgba(244, 63, 94, 0.15);

      --shadow-sm: 0 2px 6px rgba(0, 0, 0, .45);
      --shadow-md: 0 6px 24px rgba(0, 0, 0, .55), 0 0 24px rgba(99, 102, 241, .10);
      --shadow-lg: 0 16px 56px rgba(0, 0, 0, .65), 0 0 48px rgba(99, 102, 241, .16);

      --radius: 14px;
      --radius-sm: 9px;
      --sans: 'IBM Plex Sans', 'Noto Sans TC', 'PingFang TC', sans-serif;

      /* Theme-specific tokens (dark defaults) */
      --header-bg: rgba(8, 10, 26, 0.90);
      --sidebar-bg: rgba(16, 18, 42, 0.85);
      --modal-overlay-bg: rgba(4, 5, 16, 0.78);
      --modal-footer-bg: rgba(13, 15, 34, 0.6);
      --sidebar-backdrop-bg: rgba(4, 5, 16, 0.55);
      --disclaimer-bg: rgba(168, 85, 247, 0.08);
      --disclaimer-border: rgba(168, 85, 247, 0.22);
      --disclaimer-color: #C4B5FD;
      --text-strong: #C4B5FD;
      --text-code: #A78BFA;
      --code-bg: #0D0F22;
    }

    /* ── Light mode overrides ── */
    html[data-theme="light"] {
      --bg: #F8FAFC;
      --bg2: #EEF2FF;
      --surface: #FFFFFF;
      --surface2: #F1F5F9;

      --border: rgba(99, 102, 241, 0.18);
      --border-hover: rgba(168, 85, 247, 0.5);

      --vibe1-lt: rgba(99, 102, 241, 0.10);

      --text: #0F172A;
      --text-muted: #475569;
      --text-dim: #64748B;

      --green: #059669;
      --green-lt: rgba(5, 150, 105, 0.10);
      --red: #DC2626;
      --red-lt: rgba(220, 38, 38, 0.10);

      --shadow-sm: 0 2px 6px rgba(0, 0, 0, .08);
      --shadow-md: 0 6px 24px rgba(0, 0, 0, .10), 0 0 24px rgba(99, 102, 241, .07);
      --shadow-lg: 0 16px 56px rgba(0, 0, 0, .14), 0 0 48px rgba(99, 102, 241, .08);

      /* Theme-specific tokens (light) */
      --header-bg: rgba(255, 255, 255, 0.92);
      --sidebar-bg: rgba(248, 250, 252, 0.98);
      --modal-overlay-bg: rgba(15, 23, 42, 0.60);
      --modal-footer-bg: rgba(241, 245, 249, 0.95);
      --sidebar-backdrop-bg: rgba(15, 23, 42, 0.40);
      --disclaimer-bg: rgba(99, 102, 241, 0.06);
      --disclaimer-border: rgba(99, 102, 241, 0.18);
      --disclaimer-color: #4338CA;
      --text-strong: #4338CA;
      --text-code: #6D28D9;
      --code-bg: #EDE9FE;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 100%);
      background-attachment: fixed;
      min-height: 100%;
    }

    body {
      background: transparent;
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.65;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Disclaimer bar ── */
    .disclaimer-bar {
      background: var(--disclaimer-bg);
      border-bottom: 1px solid var(--disclaimer-border);
      padding: 9px 28px;
      font-size: 13px;
      color: var(--disclaimer-color);
      text-align: center;
      line-height: 1.5;
      letter-spacing: 0.01em;
    }

    /* ── Header ── */
    header {
      background: var(--header-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(99, 102, 241, 0.22);
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* Tri-colour top strip — mirrors card top strip */
    header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(to right, var(--vibe1) 0%, var(--vibe2) 50%, var(--vibe3) 100%);
      pointer-events: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--vibe1), var(--vibe2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 0 14px rgba(99, 102, 241, 0.45);
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.4px;
    }

    .logo-sub {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 400;
    }

    .header-right {
      font-size: 13px;
      color: var(--text-dim);
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 272px 1fr;
      min-height: calc(100vh - 64px);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 22px 0;
      overflow-y: auto;
      max-height: calc(100vh - 64px);
      position: sticky;
      top: 64px;
      backdrop-filter: blur(12px);
    }

    .sidebar-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 20px 12px;
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.18s;
      border-left: 3px solid transparent;
    }

    .channel-item:hover {
      background: rgba(99, 102, 241, 0.07);
    }

    .channel-item.active {
      background: var(--vibe1-lt);
      border-left-color: var(--vibe2);
    }

    .channel-item.active .channel-name {
      color: var(--vibe1);
      font-weight: 600;
    }

    .channel-item.active .channel-meta {
      color: var(--vibe1);
      opacity: 0.65;
    }

    .channel-avatar {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(99, 102, 241, 0.12);
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--vibe1);
      border: 1px solid var(--border);
    }

    .channel-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .channel-info {
      min-width: 0;
      flex: 1;
    }

    .channel-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .channel-meta {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* ── Main Content ── */
    .main {
      padding: 32px 36px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 16px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.6px;
    }

    .stats-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
      cursor: default;
    }

    .stat-chip.clickable {
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s;
    }

    .stat-chip.clickable:hover {
      background: var(--vibe1-lt);
      border-color: var(--vibe1);
      color: var(--vibe1);
    }

    .stat-chip.clickable:hover svg,
    .stat-chip.clickable:hover strong {
      color: var(--vibe1);
    }

    .stat-chip svg {
      color: var(--vibe1);
      flex-shrink: 0;
    }

    .stat-chip strong {
      color: var(--text);
    }

    /* ── Episodes Grid ── */
    .episodes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    .episode-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: var(--radius);
      padding: 22px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .episode-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-4px);
      border-left-color: var(--vibe2);
      border-color: var(--border-hover);
    }

    .episode-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .episode-channel-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--vibe1-lt);
      color: var(--vibe1);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 11px;
      border-radius: 20px;
      letter-spacing: 0.3px;
      border: 1px solid rgba(99, 102, 241, 0.25);
    }

    .episode-title {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text);
      letter-spacing: -0.2px;
    }

    .episode-hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 6px 0 2px;
    }

    .hashtag {
      font-size: 11px;
      font-weight: 500;
      color: var(--vibe2);
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.22);
      border-radius: 20px;
      padding: 2px 8px;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .modal-hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .modal-hashtags .hashtag {
      font-size: 12px;
      padding: 3px 10px;
    }

    .episode-date {
      font-size: 13px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .episode-arrow {
      color: var(--vibe2);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      align-self: flex-end;
      margin-top: auto;
      display: flex;
      align-items: center;
    }

    .episode-card:hover .episode-arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 90px 20px;
    }

    .empty-icon {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      color: var(--text-dim);
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .empty-text {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.8;
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 90px;
      color: var(--text-muted);
      font-size: 16px;
      gap: 12px;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--vibe1);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Summary Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--modal-overlay-bg);
      z-index: 200;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .modal-overlay.open {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 960px;
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.24s ease;
      position: relative;
      overflow: hidden;
    }

    /* Tri-colour top strip on modal */
    .modal::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(to right, var(--vibe1), var(--vibe2), var(--vibe3));
      z-index: 1;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.99);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-header {
      padding: 22px 36px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: linear-gradient(to bottom, rgba(99, 102, 241, .06), transparent);
    }

    .modal-title-block {
      flex: 1;
    }

    .modal-channel {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--vibe1-lt);
      color: var(--vibe1);
      font-size: 12px;
      font-weight: 600;
      padding: 4px 11px;
      border-radius: 20px;
      margin-bottom: 12px;
      border: 1px solid rgba(99, 102, 241, 0.25);
    }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: -0.4px;
      color: var(--text);
    }

    .modal-meta {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 9px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modal-close {
      background: rgba(99, 102, 241, 0.10);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
      line-height: 0;
      flex-shrink: 0;
      transition: all 0.15s;
      display: flex;
      align-items: center;
    }

    .modal-close:hover {
      background: var(--red-lt);
      color: var(--red);
      border-color: rgba(244, 63, 94, 0.35);
    }

    .modal-body {
      padding: 28px 48px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }

    .modal-body::-webkit-scrollbar {
      width: 7px;
    }

    .modal-body::-webkit-scrollbar-track {
      background: var(--surface2);
    }

    .modal-body::-webkit-scrollbar-thumb {
      background: var(--vibe1);
      border-radius: 3px;
    }

    .modal-body h1 {
      display: none;
    }

    .modal-body h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--vibe1);
      margin: 30px 0 14px;
      padding: 10px 16px;
      background: rgba(99, 102, 241, 0.10);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--vibe2);
    }

    .modal-body h2:first-of-type {
      margin-top: 0;
    }

    .modal-body p {
      font-size: 17px;
      line-height: 2.0;
      color: var(--text);
      margin-bottom: 14px;
    }

    .modal-body ul,
    .modal-body ol {
      padding-left: 26px;
      margin-bottom: 18px;
    }

    .modal-body li {
      font-size: 17px;
      line-height: 2.0;
      color: var(--text);
      margin-bottom: 8px;
    }

    .modal-body strong {
      color: var(--text-strong);
      font-weight: 600;
    }

    .modal-body a {
      color: var(--vibe1);
      text-decoration: none;
    }

    .modal-body a:hover {
      color: var(--vibe2);
      text-decoration: underline;
    }

    .modal-body code {
      font-family: 'IBM Plex Mono', 'SF Mono', monospace;
      background: var(--code-bg);
      border: 1px solid var(--border);
      padding: 2px 7px;
      font-size: 14px;
      border-radius: 5px;
      color: var(--text-code);
    }

    .modal-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      font-size: 15px;
    }

    .modal-body table th {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: left;
      padding: 8px 14px;
      border-bottom: 2px solid var(--border);
    }

    .modal-body table td {
      padding: 10px 14px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      line-height: 1.6;
    }

    .modal-body table tr:hover td {
      background: var(--vibe1-lt);
    }

    /* ── Cards Strip ── */
    .cards-strip {
      padding: 12px 36px 0;
      border-bottom: 1px solid var(--border);
    }

    .cards-strip-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .cards-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 12px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .cards-scroll::-webkit-scrollbar {
      height: 4px;
    }

    .cards-scroll::-webkit-scrollbar-track {
      background: var(--surface2);
      border-radius: 2px;
    }

    .cards-scroll::-webkit-scrollbar-thumb {
      background: var(--vibe1);
      border-radius: 2px;
    }

    .card-thumb {
      flex-shrink: 0;
      scroll-snap-align: start;
      width: 60px;
      border-radius: 6px;
      overflow: hidden;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.18s, box-shadow 0.18s;
    }

    .card-thumb:hover {
      border-color: var(--vibe2);
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(168, 85, 247, 0.3);
    }

    .card-thumb img {
      width: 100%;
      display: block;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.94);
      z-index: 400;
      align-items: center;
      justify-content: center;
      padding: 20px;
      cursor: zoom-out;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-height: 92vh;
      max-width: 92vw;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 0 0 80px rgba(99, 102, 241, 0.3);
      cursor: default;
      animation: lbIn 0.18s ease;
    }

    @keyframes lbIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .lightbox-close,
    .lightbox-nav {
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: white;
      line-height: 0;
      padding: 11px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-close:hover,
    .lightbox-nav:hover {
      background: rgba(99, 102, 241, 0.35);
    }

    .lightbox-close {
      position: fixed;
      top: 18px;
      right: 22px;
    }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
    }

    .lightbox-prev {
      left: 18px;
    }

    .lightbox-next {
      right: 18px;
    }

    .lightbox-counter {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.55);
      font-size: 14px;
      font-family: var(--sans);
    }

    /* ── Modal Footer ── */
    .modal-footer {
      padding: 22px 36px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--modal-footer-bg);
      border-radius: 0 0 18px 18px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.18s;
      text-decoration: none;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--vibe1), var(--vibe2));
      color: white;
      box-shadow: 0 3px 12px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:hover {
      filter: brightness(1.12);
      box-shadow: 0 5px 20px rgba(99, 102, 241, 0.55);
      color: white;
    }

    .btn-ghost {
      background: rgba(99, 102, 241, 0.08);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: rgba(99, 102, 241, 0.14);
      color: var(--text);
      border-color: var(--vibe1);
    }

    /* ── Mobile ── */
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 7px;
      border-radius: 7px;
      line-height: 0;
      transition: background 0.15s;
    }

    .mobile-menu-btn:hover {
      background: rgba(99, 102, 241, 0.12);
    }

    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .mobile-menu-btn {
        display: flex;
      }

      .sidebar {
        position: fixed;
        top: 64px;
        left: -272px;
        width: 272px;
        height: calc(100vh - 64px);
        transition: left 0.25s ease;
        z-index: 150;
        box-shadow: var(--shadow-lg);
      }

      .sidebar.open {
        left: 0;
      }

      .sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        top: 64px;
        background: var(--sidebar-backdrop-bg);
        z-index: 140;
      }

      .sidebar-backdrop.open {
        display: block;
      }

      .main {
        padding: 22px 18px;
      }

      .page-title {
        font-size: 24px;
      }

      .modal-overlay {
        padding: 0;
        align-items: flex-end;
      }

      .modal {
        border-radius: 18px 18px 0 0;
        max-height: 94vh;
        animation: slideUp 0.26s ease;
      }

      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }

        to {
          transform: translateY(0);
        }
      }

      .modal-header {
        padding: 22px 22px 18px;
      }

      .cards-strip {
        padding: 18px 22px 0;
      }

      .modal-body {
        padding: 22px 24px;
      }

      .modal-footer {
        padding: 18px 22px;
      }

      .modal-title {
        font-size: 20px;
      }

      .episodes-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Theme toggle button ── */
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 7px;
      line-height: 0;
      transition: background 0.18s, border-color 0.18s, color 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      background: var(--vibe1-lt);
      border-color: var(--vibe1);
      color: var(--vibe1);
    }

    .theme-toggle .icon-sun,
    .theme-toggle .icon-moon {
      display: none;
    }

    html[data-theme="light"] .theme-toggle .icon-moon {
      display: block;
    }

    html:not([data-theme="light"]) .theme-toggle .icon-sun {
      display: block;
    }

    /* ── Header right area ── */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── html transition for smooth theme switch ── */
    html {
      transition: background 0.25s ease;
    }

    body, header, .sidebar, .episode-card, .modal, .stat-chip, .hashtag {
      transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
    }

    /* ── Site Footer ── */
    .site-footer {
      text-align: center;
      padding: 24px 20px 28px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }

    .footer-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .footer-stat {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-dim);
      font-family: var(--sans);
    }

    .footer-stat svg {
      color: var(--vibe2);
      flex-shrink: 0;
    }

    .footer-stat strong {
      color: var(--text-muted);
      font-weight: 600;
    }

    .footer-sep {
      color: var(--border-hover);
      font-size: 14px;
      line-height: 1;
    }

    /* ── Modal view count ── */
    .modal-view-count {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .modal-view-count svg {
      color: var(--vibe2);
      flex-shrink: 0;
    }

    /* ── Trending / Analysis view ───────────────────────── */

    .trending-section {
      margin-bottom: 32px;
    }

    .trending-section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .trending-table {
      width: 100%;
      border-collapse: collapse;
    }

    .trending-table th {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: left;
      padding: 0 10px 8px;
    }

    .trending-table td {
      padding: 10px 10px;
      font-size: 13px;
      border-top: 1px solid var(--border);
      vertical-align: middle;
    }

    .trending-table tr:hover td {
      background: var(--vibe1-lt);
    }

    .entity-name {
      font-weight: 600;
      color: var(--text);
    }

    .entity-ticker {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .sentiment-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      gap: 1px;
      min-width: 80px;
    }

    .sentiment-bar .seg-bullish { background: var(--green); }
    .sentiment-bar .seg-bearish { background: var(--red); }
    .sentiment-bar .seg-neutral { background: var(--text-dim); }

    .sentiment-counts {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 3px;
      display: flex;
      gap: 6px;
    }

    .sentiment-counts .bull { color: var(--green); }
    .sentiment-counts .bear { color: var(--red); }

    .industry-bars {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .industry-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .industry-bar-label {
      font-size: 13px;
      color: var(--text);
      min-width: 80px;
      flex-shrink: 0;
    }

    .industry-bar-track {
      flex: 1;
      height: 8px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }

    .industry-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--vibe1), var(--vibe2));
    }

    .industry-bar-count {
      font-size: 12px;
      color: var(--text-dim);
      min-width: 28px;
      text-align: right;
    }

    .industry-filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .industry-chip {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.18s;
    }

    .industry-chip:hover, .industry-chip.active {
      background: var(--vibe1-lt);
      color: var(--vibe1);
      border-color: var(--vibe1);
    }

    /* ── Divergence view ────────────────────────────────── */

    .divergence-filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .divergence-filter-chip {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.18s;
    }

    .divergence-filter-chip:hover,
    .divergence-filter-chip.active {
      background: var(--vibe1-lt);
      color: var(--vibe1);
      border-color: var(--vibe1);
    }

    .divergence-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .divergence-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      transition: border-color 0.18s;
    }

    .divergence-card.is-diverge {
      border-color: rgba(236, 72, 153, 0.35);
    }

    .divergence-card:hover {
      border-color: var(--border-hover);
    }

    .chart-btn {
      font-size: 12px;
      background: var(--vibe1-lt);
      color: var(--vibe1);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid rgba(99, 102, 241, 0.2);
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      user-select: none;
    }

    .chart-btn:hover {
      background: var(--vibe1);
      color: white;
      border-color: var(--vibe1);
    }

    .chart-btn.active {
      background: var(--vibe3);
      color: white;
      border-color: var(--vibe3);
    }

    .divergence-chart-container {
      width: 100%;
      height: 400px;
      background: rgba(0,0,0,0.1);
    }

    .divergence-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .divergence-entity-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .divergence-entity-name.bull { color: var(--green); }
    .divergence-entity-name.bear { color: var(--red); }

    .divergence-entity-ticker {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 4px;
    }

    .consensus-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 10px;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }

    .consensus-badge.bull    { background: var(--green-lt);  color: var(--green); }
    .consensus-badge.bear    { background: var(--red-lt);    color: var(--red); }
    .consensus-badge.diverge { background: rgba(236,72,153,0.12); color: #EC4899; }
    .consensus-badge.neutral { background: var(--surface2);  color: var(--text-dim); }
    .consensus-badge.lean    { background: var(--vibe1-lt);  color: var(--vibe2); }

    .fundamentals-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 14px 2px;
      border-top: 1px solid var(--border);
      margin-top: 2px;
    }
    .fund-chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      min-width: 72px;
    }
    .fund-chip-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.3px;
      margin-bottom: 2px;
    }
    .fund-chip-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .fund-chip-value.pe-low  { color: var(--green); }
    .fund-chip-value.pe-high { color: var(--red); }
    .fund-chip-value.pos     { color: var(--green); }
    .fund-chip-value.neg     { color: var(--red); }
    .w52-bar-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      min-width: 140px;
    }
    .w52-bar-track {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 5px;
      position: relative;
    }
    .w52-bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: var(--vibe1);
      border-radius: 2px;
    }
    .w52-bar-dot {
      position: absolute;
      top: -3px;
      width: 10px;
      height: 10px;
      background: var(--vibe3);
      border-radius: 50%;
      transform: translateX(-50%);
    }
    .w52-range-labels {
      display: flex;
      justify-content: space-between;
      width: 100%;
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .divergence-total {
      font-size: 12px;
      color: var(--text-dim);
      margin-left: auto;
    }

    .channel-stances {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .channel-stance-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      background: var(--surface2);
      font-size: 13px;
    }

    .channel-stance-row.bull { border-left: 3px solid var(--green); }
    .channel-stance-row.bear { border-left: 3px solid var(--red); }
    .channel-stance-row.neutral { border-left: 3px solid var(--text-dim); }

    .stance-icon { font-size: 12px; flex-shrink: 0; }
    .stance-channel { flex: 1; color: var(--text-muted); }
    .stance-label { font-weight: 600; flex-shrink: 0; }
    .stance-label.bull { color: var(--green); }
    .stance-label.bear { color: var(--red); }
    .stance-label.neutral { color: var(--text-dim); }
    .stance-count {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 32px;
      text-align: right;
    }

    .stance-mini-bar {
      display: flex;
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
      width: 48px;
      gap: 1px;
      flex-shrink: 0;
    }
    .stance-mini-bar .seg-b { background: var(--green); }
    .stance-mini-bar .seg-r { background: var(--red); }
    .stance-mini-bar .seg-n { background: var(--text-dim); }

    /* ── Region divider ────────────────────────────────── */

    .region-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 14px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 0.03em;
    }

    .region-divider::before,
    .region-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .region-header-row td {
      padding: 22px 12px 10px;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 0.03em;
      border-bottom: 1px solid var(--border);
    }
    .region-header-row:not(:first-child) td {
      padding-top: 32px;
    }

    .sidebar-analysis-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.18s;
    }

    .sidebar-analysis-item:hover,
    .sidebar-analysis-item.active {
      background: var(--vibe1-lt);
    }

    .sidebar-analysis-item.active .analysis-item-name {
      color: var(--vibe1);
    }

    .analysis-item-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--vibe1-lt);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--vibe1);
    }

    .analysis-item-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    /* ── Search Box (B1) ── */
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      transition: border-color 0.18s;
    }
    .search-box:focus-within {
      border-color: var(--vibe1);
    }
    .search-input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      width: 180px;
    }
    .search-input::placeholder {
      color: var(--text-dim);
    }
    @media (max-width: 768px) {
      .search-box { display: none; }
    }

    /* ── Entity History Page (C1) ── */
    .entity-history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }
    .entity-history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      cursor: pointer;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .entity-history-item:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-sm);
    }
    .entity-sentiment-badge {
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      min-width: 52px;
      text-align: center;
    }
    .entity-sentiment-badge.bull { background: var(--green-lt); color: var(--green); }
    .entity-sentiment-badge.bear { background: var(--red-lt); color: var(--red); }
    .entity-sentiment-badge.neutral { background: var(--surface2); color: var(--text-dim); }
    .entity-history-info { flex: 1; min-width: 0; }
    .entity-history-title { font-weight: 600; color: var(--text); font-size: 15px; }
    .entity-history-meta { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

    /* ── Related Entities (co-occurrence) ── */
    .related-entities-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .related-entities-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }
    .related-entity-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--vibe1-lt);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      color: var(--vibe1);
      cursor: pointer;
      margin: 0 6px 6px 0;
      transition: background 0.15s;
    }
    .related-entity-chip:hover { background: rgba(99,102,241,0.25); }
    .related-entity-count { color: var(--text-dim); font-size: 11px; }

    /* ── Entity Search Page ── */
    .entity-search-input-wrap {
      position: relative;
      margin-bottom: 24px;
    }
    .entity-search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }
    .entity-search-field {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px 12px 42px;
      font-size: 15px;
      font-family: var(--sans);
      color: var(--text);
      outline: none;
      transition: border-color 0.18s;
    }
    .entity-search-field:focus { border-color: var(--vibe1); }
    .entity-search-field::placeholder { color: var(--text-dim); }
    .entity-search-count {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }
    .entity-search-results {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .entity-search-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      text-decoration: none;
    }
    .entity-search-item:hover {
      border-color: var(--border-hover);
      background: var(--vibe1-lt);
    }
    .entity-search-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .entity-search-ticker {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .entity-search-count-chip {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .entity-search-minibar {
      width: 64px;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      display: flex;
      flex-shrink: 0;
      background: var(--surface2);

    .entity-search-minibar .seg-bear { background: var(--red); }
    .entity-search-minibar .seg-neutral { background: var(--text-dim); opacity: 0.35; }

      text-align: center;
      color: var(--text-dim);

      font-size: 14px;

      align-items: center;
      justify-content: center;

      color: var(--text-dim);
      font-size: 14px;
      text-align: center;
      gap: 10px;

      margin-bottom: 8px;
      opacity: 0.5;

    .watchlist-empty .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .watchlist-star-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 6px;
      color: var(--text-dim);
      font-size: 18px;
      line-height: 1;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .watchlist-star-btn:hover {
      background: var(--vibe1-lt);
      color: var(--text-muted);

      color: #F59E0B;

      color: #D97706;

      font-size: 14px;

      color: #F59E0B;
      border-color: #F59E0B;
      background: rgba(245, 158, 11, 0.10);
    }


    /* ── Weekly Report Page ── */
    .weekly-page {
      max-width: 720px;
    }
    .weekly-meta-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .weekly-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
    }
    .weekly-body h2 {
      font-size: 17px;
      font-weight: 700;
      color: var(--vibe1);
      margin: 28px 0 12px;
      padding: 10px 16px;
      background: rgba(99,102,241,0.10);
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--vibe2);
    }

      margin-top: 0;
    }

      font-size: 16px;
      line-height: 2.0;
      color: var(--text);
      margin-bottom: 14px;
    }
    .weekly-body ul, .weekly-body ol {
      padding-left: 26px;
      margin-bottom: 18px;
    }
    .weekly-body li {
      font-size: 16px;
      line-height: 2.0;
      color: var(--text);
      margin-bottom: 6px;
    }
    .weekly-body strong {
      color: var(--text-strong);
      font-weight: 600;
    }
    .weekly-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    @keyframes toast-in-out {
      0%   { opacity: 0; transform: translateX(-50%) translateY(12px); }
      15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      75%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(12px); }
    }
    .toast-notification {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 32, 60, 0.96);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      z-index: 9999;
      pointer-events: none;
      animation: toast-in-out 1.5s ease forwards;
      white-space: nowrap;
      box-shadow: var(--shadow-md);
    }

    /* ── Flip Alerts (C2) ── */
    .flip-alert-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }
    .flip-alert-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(236, 72, 153, 0.10);
      border: 1px solid rgba(236, 72, 153, 0.30);
      border-radius: var(--radius-sm);
      padding: 7px 13px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.18s;
      text-decoration: none;
    }
    .flip-alert-chip:hover {
      background: rgba(236, 72, 153, 0.18);
    }
    .flip-arrow {
      font-size: 12px;
      color: #EC4899;
    }
    .flip-name { font-weight: 600; }
    .flip-before { color: var(--green); font-size: 12px; }
    .flip-after { color: var(--red); font-size: 12px; }

    /* ── Macro Dashboard ── */
    .macro-section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin: 28px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .macro-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .macro-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }
    .macro-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .macro-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-md);
    }
    .macro-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px 0;
    }
    .macro-card-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .macro-card-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }
    .macro-card-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 1px;
    }
    .macro-card-widget {
      height: 180px;

    }
    .macro-card-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.75;
      padding: 10px 16px 14px;

      margin-top: 2px;

    .macro-note {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 20px;
      line-height: 1.7;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    @media (max-width: 768px) {
      .macro-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    // ── Config ─────────────────────────────────────────────────

    const BASE = (() => {
      const path = location.pathname.replace(/\/[^/]*$/, '/');
      return path.endsWith('/') ? path : path + '/';
    })();

    // ── SVG Icons ──────────────────────────────────────────────

    const ICONS = {
      chart: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>`,
      tv: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>`,
      calendar: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
      doc: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
      arrowRight: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="17" height="17"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`,
      inbox: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="56" height="56"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>`,
      alertCircle: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="56" height="56"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    };

    // ── State ──────────────────────────────────────────────────

    let allEpisodes = [];
    let generatedAt = '';
    let mentionsData = null;      // loaded from mentions.json
    let divergenceData = null;    // loaded from divergence.json
    let entityHistoryData = null; // loaded from entity_history.json
    let flipsData = null;         // loaded from flips.json
    let cooccurrenceData = null;  // loaded from cooccurrence.json
    let searchQuery = '';         // global search filter (B1)

    // ── Helpers ────────────────────────────────────────────────

    function stripFrontmatter(md) {
      if (!md.startsWith('---')) return md;
      const end = md.indexOf('---', 3);
      if (end === -1) return md;
      return md.slice(end + 3).replace(/^\n+/, '');
    }

    function fmt(dateStr) {
      if (!dateStr) return '';
      if (!/^\d{4}-\d{2}-\d{2}/.test(dateStr)) return dateStr;
      try {
        return new Date(dateStr).toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
      } catch { return dateStr; }
    }

    function channelIcon(name) {
      if (!name) return ICONS.tv;
      const n = name.toLowerCase();
      if (n.includes('股癌') || n.includes('gooaye')) return ICONS.chart;
      return ICONS.tv;
    }

    // ── Data Fetch ─────────────────────────────────────────────

    async function loadData() {
      const resp = await fetch(BASE + 'data/episodes.json');
      if (!resp.ok) throw new Error('Failed to load episodes.json');
      const data = await resp.json();
      allEpisodes = data.episodes || [];
      generatedAt = data.generated_at || '';

      const el = document.getElementById('lastUpdated');
      if (generatedAt) {
        const d = new Date(generatedAt + 'Z');
        el.textContent = '更新：' + d.toLocaleDateString('zh-TW');
      }

      // Load analysis data (best-effort — may not exist yet)
      try {
        const mResp = await fetch(BASE + 'data/mentions.json');
        if (mResp.ok) mentionsData = await mResp.json();
      } catch (_) { /* no mentions data yet */ }
      try {
        const dResp = await fetch(BASE + 'data/divergence.json');
        if (dResp.ok) divergenceData = await dResp.json();
      } catch (_) { /* no divergence data yet */ }
      try {
        const ehResp = await fetch(BASE + 'data/entity_history.json');
        if (ehResp.ok) entityHistoryData = await ehResp.json();
      } catch (_) { /* no entity history yet */ }
      try {
        const fResp = await fetch(BASE + 'data/flips.json');
        if (fResp.ok) flipsData = await fResp.json();
      } catch (_) { /* no flips data yet */ }
      try {
        const coResp = await fetch(BASE + 'data/cooccurrence.json');
        if (coResp.ok) cooccurrenceData = await coResp.json();
      } catch (_) { /* no cooccurrence data yet */ }
    }

    // ── Routing ────────────────────────────────────────────────

    function getRoute() {
      const hash = location.hash || '#/';
      if (hash.startsWith('#/channel/')) {
        return { type: 'channel', id: decodeURIComponent(hash.slice(10)) };
      }
      if (hash === '#/trending') {
        return { type: 'trending' };
      }
      if (hash === '#/divergence') {
        return { type: 'divergence' };
      }
      if (hash === '#/macro') {
        return { type: 'macro' };
      }
      if (hash.startsWith('#/industry/')) {
        return { type: 'industry', name: decodeURIComponent(hash.slice(11)) };
      }
      if (hash.startsWith('#/entity/')) {
        return { type: 'entity', name: decodeURIComponent(hash.slice(9)) };
      }
      if (hash === '#/entity-search' || hash.startsWith('#/entity-search?')) {
        const q = new URLSearchParams(hash.includes('?') ? hash.slice(hash.indexOf('?')) : '').get('q') || '';
        return { type: 'entity-search', query: q };
      }
      if (hash === '#/watchlist') {
        return { type: 'watchlist' };
      }
      if (hash === '#/weekly') {
        return { type: 'weekly' };
      }
      return { type: 'all' };
    }

    // ── Modal ──────────────────────────────────────────────────

    async function openModal({ videoId, channelName, title, date, summaryUrl, cards, hashtags, sourceType, sourceUrl }) {
      const overlay = document.getElementById('modalOverlay');
      const body = document.getElementById('modalBody');
      const strip = document.getElementById('cardsStrip');
      const scroll = document.getElementById('cardsScroll');

      document.getElementById('modalChannel').textContent = channelName;
      document.getElementById('modalTitle').textContent = title;

      const hashtagsEl = document.getElementById('modalHashtags');
      if (hashtags) {
        hashtagsEl.innerHTML = hashtags.split(/\s+/).filter(t => t)
          .map(t => `<span class="hashtag">${t}</span>`).join('');
        hashtagsEl.style.display = 'flex';
      } else {
        hashtagsEl.innerHTML = '';
        hashtagsEl.style.display = 'none';
      }

      const metaEl = document.getElementById('modalMeta');
      metaEl.innerHTML = date ? `${ICONS.calendar} ${date}` : '';
      const ytLinkEl = document.getElementById('modalYtLink');
      if (sourceType === 'newsletter' && sourceUrl) {
        ytLinkEl.href = sourceUrl;
        ytLinkEl.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> 閱讀原文於 Substack`;
      } else {
        ytLinkEl.href = `https://youtube.com/watch?v=${videoId}`;
        ytLinkEl.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><polygon points="5 3 19 12 5 21 5 3"/></svg> YouTube 觀看原片`;
      }
      body.innerHTML = '<div class="loading"><div class="spinner"></div> 載入中…</div>';

      if (cards && cards.length) {
        scroll.innerHTML = cards.map((url, i) =>
          `<div class="card-thumb" data-index="${i}">
        <img src="${BASE + url}" alt="字卡 ${i + 1}" loading="lazy">
      </div>`
        ).join('');
        strip.style.display = 'block';
        scroll.querySelectorAll('.card-thumb').forEach(thumb => {
          thumb.addEventListener('click', () => openLightbox(cards, +thumb.dataset.index));
        });
      } else {
        strip.style.display = 'none';
        scroll.innerHTML = '';
      }

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';

      // Track & display per-article view count
      const viewEl = document.getElementById('modalViewCount');
      const viewTextEl = document.getElementById('modalViewCountText');
      viewEl.style.display = 'none';
      const articleUrl = `${location.origin}${location.pathname}#/article/${videoId}`;
      fetchArticleViews(articleUrl).then(count => {
        if (count !== null) {
          viewTextEl.textContent = `${Number(count).toLocaleString('zh-TW')} 次瀏覽`;
          viewEl.style.display = 'flex';
        }
      });

      try {
        const resp = await fetch(BASE + summaryUrl);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const md = await resp.text();
        const bodyMd = stripFrontmatter(md);
        body.innerHTML = marked.parse(bodyMd);
        body.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
      } catch (e) {
        body.innerHTML = `<p style="color:var(--red)">⚠️ 載入摘要失敗：${e.message}</p>`;
      }
    }

    // ── Trending / Analysis view ───────────────────────────────

    function renderTrending() {
      const mc = document.getElementById('mainContent');

      if (!mentionsData) {
        mc.innerHTML = `
          <div class="page-header"><h1 class="page-title">📊 標的追蹤</h1></div>

      }

      const trending = mentionsData.trending || [];
      const industries = mentionsData.industries || [];
      const maxCount = Math.max(...industries.map(i => i.count), 1);

      // Build trending table rows for a given entity list
      function _trendingRows(list) {
        return list.map(e => {
          const total = (e.bullish || 0) + (e.bearish || 0) + (e.neutral || 0);
          const bPct = total ? Math.round((e.bullish / total) * 100) : 0;
          const rPct = total ? Math.round((e.bearish / total) * 100) : 0;
          const nPct = 100 - bPct - rPct;
          return `
            <tr>
              <td>
                <div class="entity-name">
                  <a href="#/entity/${encodeURIComponent(e.name)}" style="color:inherit;text-decoration:none;cursor:pointer">${e.name}</a>
                </div>
                ${e.ticker ? `<div class="entity-ticker">${e.ticker}</div>` : ''}
              </td>
              <td style="text-align:right;font-weight:600;color:var(--vibe2)">${e.count}</td>
              <td style="min-width:140px">
                <div class="sentiment-bar">
                  ${bPct > 0 ? `<div class="seg-bullish" style="width:${bPct}%"></div>` : ''}
                  ${rPct > 0 ? `<div class="seg-bearish" style="width:${rPct}%"></div>` : ''}
                  ${nPct > 0 ? `<div class="seg-neutral" style="width:${nPct}%"></div>` : ''}
                </div>
                <div class="sentiment-counts">
                  <span class="bull">▲ ${e.bullish || 0}</span>
                  <span class="bear">▼ ${e.bearish || 0}</span>
                  <span>→ ${e.neutral || 0}</span>
                </div>
              </td>
            </tr>`;
        }).join('');
      }

      const twTrending = trending.filter(e =>  _isTwEntity(e.name, e.ticker));
      const usTrending = trending.filter(e => !_isTwEntity(e.name, e.ticker));

      let trendingHtml = '';
      if (!trending.length) {
        trendingHtml = '<div style="color:var(--text-dim);font-size:14px">尚無資料</div>';
      } else {
        let bodyRows = '';
        if (twTrending.length) {
          bodyRows += `<tr class="region-header-row"><td colspan="3"><span>🇹🇼 台灣</span></td></tr>`;
          bodyRows += _trendingRows(twTrending);
        }
        if (usTrending.length) {
          bodyRows += `<tr class="region-header-row"><td colspan="3"><span>🌐 美國及其他</span></td></tr>`;
          bodyRows += _trendingRows(usTrending);
        }
        trendingHtml = `
          <table class="trending-table">
            <thead><tr>
              <th>名稱</th>
              <th style="text-align:right">提及次數</th>
              <th>多空比例</th>
            </tr></thead>
            <tbody>${bodyRows}</tbody>
          </table>`;
      }

      // Industry bars
      let industryBars = '';
      for (const ind of industries) {
        const pct = Math.round((ind.count / maxCount) * 100);
        industryBars += `
          <div class="industry-bar-row">
            <div class="industry-bar-label">
              <a href="#/industry/${encodeURIComponent(ind.name)}" style="color:inherit;text-decoration:none">${ind.name}</a>
            </div>
            <div class="industry-bar-track">
              <div class="industry-bar-fill" style="width:${pct}%"></div>
            </div>
            <div class="industry-bar-count">${ind.count}</div>
          </div>`;
      }

      // Build flip alerts HTML
      let flipsHtml = '';
      if (flipsData && flipsData.flips && flipsData.flips.length) {
        const SENT_LABEL = { '看多': '▲ 看多', '看空': '▼ 看空', '中立': '→ 中立' };
        const chipHtml = flipsData.flips.map(f => {
          const beforeCls = f.before === '看多' ? 'flip-before' : 'flip-after';
          const afterCls = f.after === '看多' ? 'flip-before' : 'flip-after';
          return `<a class="flip-alert-chip" href="#/entity/${encodeURIComponent(f.name)}">
            <span class="flip-arrow">⚡</span>
            <span class="flip-name">${f.name}</span>
            <span class="${beforeCls}">${SENT_LABEL[f.before] || f.before}</span>
            <span class="flip-arrow">→</span>
            <span class="${afterCls}">${SENT_LABEL[f.after] || f.after}</span>
          </a>`;
        }).join('');
        flipsHtml = `
          <div class="trending-section">
            <div class="trending-section-title">⚡ 情緒翻轉（近 30 天 vs 前 30 天）</div>
            <div class="flip-alert-bar">${chipHtml}</div>
          </div>`;

    // ── Region classifier ─────────────────────────────────────

    function _isTwEntity(name, ticker) {
      if (ticker) {
        // Taiwan stock: 4-digit (2330, 1101, 0050)
        if (/^\d{4}$/.test(ticker)) return true;
        // Taiwan ETF: 5-digit starting with 0 (00878, 00631)
        if (/^0\d{4}$/.test(ticker)) return true;
        // Taiwan market indices (TWII, TAIEX, TWN, etc.)
        if (/^TW/i.test(ticker)) return true;
        // Anything else with a ticker (US alphabetic, Korean 6-digit, etc.) = non-Taiwan
        return false;
      }
      // No ticker: use Chinese character ratio (>40% → Taiwan)
      const chLen = (name.match(/[\u4e00-\u9fff]/g) || []).length;
      return name.length > 0 && chLen / name.length > 0.4;
    }

      '中立共識': { cls: 'neutral', label: '→ 中立共識'  },
      '偏多':    { cls: 'lean',    label: '↗ 偏多'      },
      '偏空':    { cls: 'lean',    label: '↘ 偏空'      },
    };

    const STANCE_META = {
      '看多': { cls: 'bull',    icon: '▲' },
      '看空': { cls: 'bear',    icon: '▼' },
      '中立': { cls: 'neutral', icon: '→' },
    };

    function renderDivergence() {
      const mc = document.getElementById('mainContent');

      if (!divergenceData) {
        mc.innerHTML = `
          <div class="page-header"><h1 class="page-title">🔀 多空分歧</h1></div>
          <div class="empty-state">
            <div class="empty-icon">${ICONS.alertCircle}</div>
            <div class="empty-title">尚無跨頻道分析資料</div>
            <div class="empty-text">執行 <code>python3 runner.py backfill-analysis</code> 後再部署即可。</div>
          </div>`;
        return;
      }

      const all = divergenceData.entities || [];
      if (!all.length) {
        mc.innerHTML = `
          <div class="page-header"><h1 class="page-title">🔀 多空分歧</h1></div>
          <div class="empty-state">
            <div class="empty-icon">${ICONS.inbox}</div>
            <div class="empty-title">還沒有跨頻道提及的標的</div>
            <div class="empty-text">需要 2 個以上頻道同時提及同一標的才會出現在此頁。</div>
          </div>`;
        return;
      }

      // Render with active filter
      function _render(filter) {
        const filtered = filter === 'all' ? all
          : filter === '多空分歧' ? all.filter(e => e.consensus === '多空分歧')
          : all.filter(e => e.consensus === filter);

        const filterBtns = ['全部', '多空分歧', '看多共識', '看空共識', '中立共識', '偏多', '偏空']
          .filter(f => f === '全部' || all.some(e => e.consensus === f))
          .map(f => {
            const label = f === '全部' ? `全部 (${all.length})` : (CONSENSUS_META[f]?.label || f);
            const active = (filter === 'all' && f === '全部') || filter === f;
            return `<span class="divergence-filter-chip ${active ? 'active' : ''}" data-filter="${f === '全部' ? 'all' : f}">${label}</span>`;
          }).join('');

        function _buildCard(e) {
          const meta = CONSENSUS_META[e.consensus] || { cls: 'neutral', label: e.consensus };
          const tickerStr = e.ticker ? `<span class="divergence-entity-ticker">${e.ticker}</span>` : '';
          const isDiverge = e.consensus === '多空分歧';
          const nameColorCls = ['看多共識', '偏多'].includes(e.consensus) ? 'bull'
            : ['看空共識', '偏空'].includes(e.consensus) ? 'bear' : '';
          
          // Generate a safe ID for the chart container
          const safeId = 'chart-' + Math.random().toString(36).substr(2, 9);
          
          let channelRows = '';
          for (const ch of e.channels) {
            const sm = STANCE_META[ch.stance] || { cls: 'neutral', icon: '?' };
            const tot = ch.bullish + ch.bearish + ch.neutral || 1;
            const bPct = Math.round(ch.bullish / tot * 100);
            const rPct = Math.round(ch.bearish / tot * 100);
            const nPct = 100 - bPct - rPct;
            channelRows += `
              <div class="channel-stance-row ${sm.cls}">
                <span class="stance-icon">${sm.icon}</span>
                <span class="stance-channel">${ch.channel_name}</span>
                <div class="stance-mini-bar">
                  ${bPct > 0 ? `<div class="seg-b" style="width:${bPct}%"></div>` : ''}
                  ${rPct > 0 ? `<div class="seg-r" style="width:${rPct}%"></div>` : ''}
                  ${nPct > 0 ? `<div class="seg-n" style="width:${nPct}%"></div>` : ''}
                </div>
                <span class="stance-label ${sm.cls}">${ch.stance}</span>
                <span class="stance-count">${ch.mentions}次</span>
              </div>`;
          }
          
          const chartBtn = e.ticker ? `<span class="chart-btn" onclick="toggleChart(this, '${safeId}', '${e.name}', '${e.ticker}')">📊 價量趨勢</span>` : '';

          // ── Fundamentals row ──────────────────────────────────
          function _fmtPe(v) {
            if (v == null) return '<span class="fund-chip-value" style="color:var(--text-dim)">—</span>';
            const cls = v < 15 ? 'pe-low' : v > 35 ? 'pe-high' : '';
            return `<span class="fund-chip-value ${cls}">${v}x</span>`;
          }
          function _fmtGrowth(v) {
            if (v == null) return '<span class="fund-chip-value" style="color:var(--text-dim)">—</span>';
            const pct = (v * 100).toFixed(1);
            const cls = v >= 0 ? 'pos' : 'neg';
            return `<span class="fund-chip-value ${cls}">${v >= 0 ? '+' : ''}${pct}%</span>`;
          }
          function _fmtCap(v) {
            if (v == null) return '<span class="fund-chip-value" style="color:var(--text-dim)">—</span>';
            const t = v >= 1e12 ? `$${(v/1e12).toFixed(2)}T` : `$${(v/1e9).toFixed(1)}B`;
            return `<span class="fund-chip-value">${t}</span>`;
          }

          let fundHtml = '';
          const f = e.fundamentals;
          if (f) {
            const chips = [
              `<div class="fund-chip"><span class="fund-chip-label">本益比 P/E</span>${_fmtPe(f.pe)}</div>`,
              `<div class="fund-chip"><span class="fund-chip-label">預估 P/E</span>${_fmtPe(f.fwd_pe)}</div>`,
              `<div class="fund-chip"><span class="fund-chip-label">市值</span>${_fmtCap(f.mkt_cap)}</div>`,
              `<div class="fund-chip"><span class="fund-chip-label">EPS 成長</span>${_fmtGrowth(f.eps_growth)}</div>`,
              `<div class="fund-chip"><span class="fund-chip-label">營收成長</span>${_fmtGrowth(f.rev_growth)}</div>`,
            ].join('');

            let w52Html = '';
            if (f.w52_low != null && f.w52_high != null && f.price != null) {
              const range = f.w52_high - f.w52_low || 1;
              const pct = Math.min(100, Math.max(0, ((f.price - f.w52_low) / range * 100))).toFixed(1);
              w52Html = `
                <div class="w52-bar-wrap">
                  <span class="fund-chip-label">52 週區間</span>
                  <div class="w52-bar-track">
                    <div class="w52-bar-fill" style="width:${pct}%"></div>
                    <div class="w52-bar-dot" style="left:${pct}%"></div>
                  </div>
                  <div class="w52-range-labels">
                    <span>$${f.w52_low}</span>
                    <span style="color:var(--text);font-weight:600">$${f.price}</span>
                    <span>$${f.w52_high}</span>
                  </div>
                </div>`;
            }

            fundHtml = `<div class="fundamentals-row">${chips}${w52Html}</div>`;
          }

          return `
            <div class="divergence-card ${isDiverge ? 'is-diverge' : ''}">
              <div class="divergence-card-header">
                <span class="divergence-entity-name ${nameColorCls}">${e.name}</span>
                ${tickerStr}
                ${chartBtn}
                <span class="consensus-badge ${meta.cls}">${meta.label}</span>
                <span class="divergence-total">${e.total_mentions} 次提及 · ${e.channel_count} 頻道</span>
              </div>
              ${fundHtml}
              <div class="channel-stances">${channelRows}</div>
              <div class="divergence-chart-container" id="${safeId}" style="display:none;margin-top:16px;border-radius:10px;overflow:hidden;border:1px solid var(--border)"></div>
            </div>`;
        }

        const CONSENSUS_ORDER = { '看多共識': 0, '偏多': 1, '中立共識': 2, '偏空': 3, '看空共識': 4, '多空分歧': 5 };
        const _sortConsensus = (a, b) => (CONSENSUS_ORDER[a.consensus] ?? 99) - (CONSENSUS_ORDER[b.consensus] ?? 99);
        const twFiltered = filtered.filter(e =>  _isTwEntity(e.name, e.ticker)).sort(_sortConsensus);
        const usFiltered = filtered.filter(e => !_isTwEntity(e.name, e.ticker)).sort(_sortConsensus);

        let cards = '';
        if (filtered.length === 0) {
          cards = `<div style="color:var(--text-dim);font-size:14px;padding:20px 0">此類別暫無資料</div>`;
        } else {
          if (twFiltered.length) cards += `
            <div class="region-divider"><span>🇹🇼 台灣</span></div>
            ${twFiltered.map(_buildCard).join('')}`;
          if (usFiltered.length) cards += `
            <div class="region-divider"><span>🌐 美國及其他</span></div>
            ${usFiltered.map(_buildCard).join('')}`;
        }

        mc.innerHTML = `
          <div class="page-header"><h1 class="page-title">🔀 多空分歧</h1></div>
          <div style="font-size:13px;color:var(--text-dim);margin-bottom:16px">
            近 90 天內被 2 個以上頻道同時提及的標的，比較各頻道的多空立場
          </div>
          <div class="divergence-filter-bar">${filterBtns}</div>
          <div class="divergence-list">${cards}</div>`;

        document.querySelectorAll('.divergence-filter-chip').forEach(chip => {
          chip.addEventListener('click', () => _render(chip.dataset.filter));
        });
      }

      _render('all');
    }

    // ── Watchlist helpers ──────────────────────────────────────

    let _watchlistCache = null;

    function getWatchlist() {
      if (_watchlistCache === null) {
        _watchlistCache = JSON.parse(localStorage.getItem('watchlist') || '[]');
      }
      return _watchlistCache;
    }

    function isWatchlisted(name) {
      return getWatchlist().includes(name);
    }

    function toggleWatchlist(name) {
      const wl = getWatchlist().slice();
      const idx = wl.indexOf(name);
      if (idx >= 0) {
        wl.splice(idx, 1);
        showToast('已移除自選');
      } else {
        wl.push(name);
        showToast('已加入自選');
      }
      localStorage.setItem('watchlist', JSON.stringify(wl));
      _watchlistCache = null;
    }

    // ── Sentiment minibar helper ────────────────────────────────

    function _sentimentMinibar(bull, bear, neutral) {
      const total = (bull || 0) + (bear || 0) + (neutral || 0) || 1;
      const bPct = Math.round((bull || 0) / total * 100);
      const rPct = Math.round((bear || 0) / total * 100);
      const nPct = 100 - bPct - rPct;
      return `<div class="entity-search-minibar">
        ${bPct > 0 ? `<div class="seg-bull" style="width:${bPct}%"></div>` : ''}
        ${rPct > 0 ? `<div class="seg-bear" style="width:${rPct}%"></div>` : ''}
        ${nPct > 0 ? `<div class="seg-neutral" style="width:${nPct}%"></div>` : ''}
      </div>`;
    }

    function showToast(msg) {
      const el = document.createElement('div');
      el.className = 'toast-notification';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 1500);
    }

    function toggleChart(btn, containerId, name, ticker) {
      const container = document.getElementById(containerId);
      const isActive = btn.classList.contains('active');

      if (isActive) {
        container.style.display = 'none';
        btn.classList.remove('active');
        btn.innerHTML = '📊 價量趨勢';
      } else {
        container.style.display = 'block';
        container.style.height = '400px';
        btn.classList.add('active');
        btn.innerHTML = '關閉圖表';

        if (!container.dataset.initialized) {
          // Taiwan 4–5 digit numeric tickers → TWSE API + Lightweight Charts
          if (/^\d{4,5}$/.test(ticker)) {
            _renderTwStockChart(container, ticker);
          } else {
            // US / global → TradingView iframe
            container.dataset.initialized = '1';
            const indexMap = {
              'DJIA': 'TVC:DJI', 'SPX': 'SP:SPX', 'SOX': 'PHLX:SOX',
              'RUT': 'TVC:RUT', 'IXIC': 'NASDAQ:IXIC', 'NDX': 'NASDAQ:NDX',
              'VIX': 'TVC:VIX', 'TWII': 'TWSE:TWII',
            };
            const tUp = ticker.toUpperCase();
            const symbol = indexMap[tUp] || tUp;
            const isDark = !document.documentElement.hasAttribute('data-theme');
            const iframe = document.createElement('iframe');
            const url = new URL('https://www.tradingview.com/widgetembed/');
            url.searchParams.set('symbol', symbol);
            url.searchParams.set('interval', 'D');
            url.searchParams.set('hidesidetoolbar', '1');
            url.searchParams.set('symboledit', '0');
            url.searchParams.set('saveimage', '0');
            url.searchParams.set('toolbarbg', isDark ? '131722' : 'f1f3f6');
            url.searchParams.set('studies', '["Volume@tv-basicstudies"]');
            url.searchParams.set('theme', isDark ? 'dark' : 'light');
            url.searchParams.set('style', '1');
            url.searchParams.set('timezone', 'Asia/Taipei');
            url.searchParams.set('locale', 'zh_TW');
            iframe.src = url.href;
            iframe.style.cssText = 'width:100%;height:100%;border:none;';
            iframe.setAttribute('allowfullscreen', 'true');
            container.appendChild(iframe);
          }
        }
      }
    }

    function _rocToIso(s) {
      const p = (s || '').trim().split('/');
      if (p.length !== 3) return '';
      return `${parseInt(p[0]) + 1911}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`;
    }

    function _cleanNum(s) {
      return parseFloat(String(s || '0').replace(/,/g, '')) || 0;
    }

    async function _fetchTwseOhlcv(ticker) {
      // Use www.twse.com.tw (CORS: *), fetch last 3 months
      const now = new Date();
      const promises = [];
      for (let i = 0; i < 3; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
        const dateStr = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}01`;
        const url = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${dateStr}&stockNo=${encodeURIComponent(ticker)}`;
        promises.push(fetch(url).then(r => r.ok ? r.json() : null).catch(() => null));
      }
      const rows = [];
      for (const json of await Promise.all(promises)) {
        if (!json || json.stat !== 'OK' || !Array.isArray(json.data)) continue;
        // fields: [日期, 成交股數, 成交金額, 開盤價, 最高價, 最低價, 收盤價, 漲跌價差, 成交筆數, 註記]
        for (const r of json.data) {
          const time = _rocToIso(r[0]);
          if (!time) continue;
          const open   = _cleanNum(r[3]);
          const high   = _cleanNum(r[4]);
          const low    = _cleanNum(r[5]);
          const close  = _cleanNum(r[6]);
          const volume = _cleanNum(r[1]);
          if (close > 0) rows.push({ time, open, high, low, close, volume });
        }
      }
      return rows.sort((a, b) => a.time.localeCompare(b.time));
    }

    async function _renderTwStockChart(container, ticker) {
      container.dataset.initialized = '1';
      container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:13px">載入台股資料中…</div>`;

      let data = await _fetchTwseOhlcv(ticker);

      if (data.length < 2) {
        container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:13px">查無歷史資料</div>`;
        return;
      }

      if (typeof LightweightCharts === 'undefined') {
        await new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js';
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        }).catch(() => null);
      }

      if (typeof LightweightCharts === 'undefined') {
        container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:13px">圖表庫載入失敗</div>`;
        return;
      }

      container.innerHTML = '';
      const isDark = !document.documentElement.hasAttribute('data-theme');
      const bg        = isDark ? '#131722' : '#ffffff';
      const textColor = isDark ? '#d1d4dc' : '#333333';
      const lineColor = isDark ? '#2a2e39' : '#e0e3eb';
      const w = container.clientWidth  || container.parentElement?.clientWidth  || 400;
      const h = container.clientHeight || 400;

      const chart = LightweightCharts.createChart(container, {
        width: w, height: h,
        layout: { background: { color: bg }, textColor },
        grid:   { vertLines: { color: lineColor }, horzLines: { color: lineColor } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        rightPriceScale: { borderColor: lineColor, scaleMargins: { top: 0.05, bottom: 0.28 } },
        timeScale: { borderColor: lineColor },
        handleScroll: { mouseWheel: false },
        handleScale: { mouseWheel: false },
      });

      // Taiwan convention: red = up, green = down
      const candleSeries = chart.addCandlestickSeries({
        upColor: '#ef5350', downColor: '#26a69a',
        borderUpColor: '#ef5350', borderDownColor: '#26a69a',
        wickUpColor: '#ef5350', wickDownColor: '#26a69a',
      });
      candleSeries.setData(data.map(({ time, open, high, low, close }) => ({ time, open, high, low, close })));

      const volSeries = chart.addHistogramSeries({
        priceScaleId: 'volume',
        color: isDark ? 'rgba(99,102,241,0.45)' : 'rgba(99,102,241,0.35)',
        priceFormat: { type: 'volume' },
      });
      volSeries.priceScale().applyOptions({ scaleMargins: { top: 0.76, bottom: 0 } });
      volSeries.setData(data.map(({ time, volume }) => ({ time, value: volume })));

      chart.timeScale().fitContent();
      new ResizeObserver(() => {
        chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
      }).observe(container);
    }

            ${rPct > 0 ? `<div class="seg-bearish" style="width:${rPct}%"></div>` : ''}

    function renderEntitySearch(initialQuery) {
      const mc = document.getElementById('mainContent');
      renderSidebar(allEpisodes, null);
      const searchBox = document.getElementById('searchBox');
      if (searchBox) searchBox.style.display = 'none';

      // Build entity list from mentionsData.trending (has ticker + sentiment counts)
      // Always use entityHistoryData (full set of all entities) for search.
      // mentionsData.trending was previously capped at 20, causing entities like
      // Lumentum to be invisible in search even though they exist in the history.
      let entities = [];
      if (entityHistoryData && entityHistoryData.entities) {
        entities = Object.entries(entityHistoryData.entities).map(([name, eps]) => {
          const ticker = (eps[0] && eps[0].ticker) || '';
          return {
            name,
            ticker,
            nameLow: name.toLowerCase(),
            tickerLow: ticker.toLowerCase(),
            count: eps.length,
            bull: eps.filter(e => e.sentiment === '看多').length,
            bear: eps.filter(e => e.sentiment === '看空').length,
            neutral: eps.filter(e => e.sentiment === '中立').length,
          };
        }).sort((a, b) => b.count - a.count);
      } else if (mentionsData && mentionsData.trending && mentionsData.trending.length) {
        entities = mentionsData.trending.map(e => {
          const ticker = e.ticker || '';
          return {
            name: e.name,
            ticker,
            nameLow: e.name.toLowerCase(),
            tickerLow: ticker.toLowerCase(),
            count: e.count || 0,
            bull: e.bullish || 0,
            bear: e.bearish || 0,
            neutral: e.neutral || 0,
          };
        });
      }

      function _buildItems(q) {
        const qLow = q.trim().toLowerCase();
        const filtered = qLow
          ? entities.filter(e =>
              e.nameLow.includes(qLow) ||
              e.tickerLow.includes(qLow)
            )
          : entities;

        const html = filtered.length
          ? filtered.map(e => {
              const starred = isWatchlisted(e.name);
              return `
                <div class="entity-search-item" data-entity-name="${e.name.replace(/"/g, '&quot;')}">
                  <div style="flex:1;min-width:0">
                    <div class="entity-search-name">${e.name}</div>
                    ${e.ticker ? `<div class="entity-search-ticker">${e.ticker}</div>` : ''}
                  </div>
                  ${_sentimentMinibar(e.bull, e.bear, e.neutral)}
                  <div class="entity-search-count-chip">${e.count} 次</div>
                  <button class="watchlist-star-btn${starred ? ' active' : ''}" data-wl-name="${e.name.replace(/"/g, '&quot;')}" title="${starred ? '移除自選' : '加入自選'}">${starred ? '⭐' : '☆'}</button>
                </div>`;
            }).join('')
          : `<div class="entity-search-no-result">找不到「${q}」相關標的</div>`;

        return { html, count: filtered.length };
      }

      mc.innerHTML = `
        <div class="page-header">
          <h1 class="page-title">🔍 標的搜尋</h1>
        </div>
        <div class="entity-search-input-wrap">
          <svg class="entity-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="entitySearchField" class="entity-search-field" type="search"
            placeholder="搜尋標的名稱或代號，例如：台積電、NVDA、2330…"
            autocomplete="off" value="${initialQuery.replace(/"/g, '&quot;')}">
        </div>
        <div id="entitySearchCount" class="entity-search-count"></div>
        <div id="entitySearchResults" class="entity-search-results"></div>
      `;

      function _update(q) {
        const { html, count } = _buildItems(q);
        document.getElementById('entitySearchResults').innerHTML = html;
        document.getElementById('entitySearchCount').textContent =
          q ? `找到 ${count} 個標的` : `共 ${entities.length} 個標的`;
        // Bind entity row clicks (navigate)
        document.querySelectorAll('.entity-search-item').forEach(el => {
          el.addEventListener('click', (evt) => {
            if (evt.target.closest('.watchlist-star-btn')) return;
            const name = el.dataset.entityName;
            location.hash = `#/entity/${encodeURIComponent(name)}`;
          });
        });
        // Bind star button clicks (toggle watchlist, update button state only)
        document.querySelectorAll('#entitySearchResults .watchlist-star-btn').forEach(btn => {
          btn.addEventListener('click', (evt) => {
            evt.stopPropagation();
            const name = btn.dataset.wlName;
            toggleWatchlist(name);
            const starred = isWatchlisted(name);
            btn.classList.toggle('active', starred);
            btn.textContent = starred ? '⭐' : '☆';
            btn.title = starred ? '移除自選' : '加入自選';
          });
        });
      }

      _update(initialQuery);

      const field = document.getElementById('entitySearchField');
      field.addEventListener('input', () => _update(field.value));
      // Focus the input
      setTimeout(() => field.focus(), 50);
    }

    // ── Router ─────────────────────────────────────────────────

    function route() {
      const r = getRoute();
      let filtered, title;

      // Reset search on route change
      searchQuery = '';
      const searchInput = document.getElementById('searchInput');
      if (searchInput) searchInput.value = '';

      // Hide search box by default; renderEpisodes will show it when appropriate
      const searchBox = document.getElementById('searchBox');
      if (searchBox) searchBox.style.display = 'none';

      if (r.type === 'macro') {
        renderSidebar(allEpisodes, null);
        renderMacro();
        return;
      }
      if (r.type === 'trending') {
        renderSidebar(allEpisodes, null);
        renderTrending();
        return;
      }
      if (r.type === 'divergence') {
        renderSidebar(allEpisodes, null);
        renderDivergence();
        return;
      }
      if (r.type === 'entity') {
        renderEntityHistory(r.name);
        return;
      }
      if (r.type === 'entity-search') {
        renderEntitySearch(r.query || '');
        return;
      }
      if (r.type === 'watchlist') {
        renderWatchlist();
        return;
      }
      if (r.type === 'weekly') {
        renderWeekly();
        return;
      }

      if (r.type === 'industry') {
        filtered = _getEpisodesForIndustry(r.name);
        title = `🏭 ${r.name}`;
      } else if (r.type === 'channel') {
        filtered = allEpisodes.filter(e => e.channel_id === r.id);
        const ch = allEpisodes.find(e => e.channel_id === r.id);
        title = ch ? ch.channel_name : r.id;
      } else {
        filtered = allEpisodes;
        title = '全部節目';
      }

      renderSidebar(allEpisodes, r.type === 'channel' ? r.id : null);
      renderEpisodes(filtered, title, r.type === 'industry' ? r.name : null);
    }

    // ── Init ───────────────────────────────────────────────────

    (async () => {
      try {
        await loadData();
        route();
      } catch (e) {
        document.getElementById('mainContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${ICONS.alertCircle}</div>
        <div class="empty-title">載入失敗</div>
        <div class="empty-text">${e.message}</div>
      </div>
    `;
      }
    })();

    // ── Lightbox ──────────────────────────────────────────────

    let lbCards = [];
    let lbIndex = 0;

    function openLightbox(cards, index) {
      lbCards = cards;
      lbIndex = index;
      _lbShow();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function _lbShow() {
      document.getElementById('lbImg').src = BASE + lbCards[lbIndex];
      document.getElementById('lbCounter').textContent = `${lbIndex + 1} / ${lbCards.length}`;
      document.getElementById('lbPrev').style.visibility = lbIndex > 0 ? 'visible' : 'hidden';
      document.getElementById('lbNext').style.visibility = lbIndex < lbCards.length - 1 ? 'visible' : 'hidden';
    }

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });
    document.getElementById('lbPrev').addEventListener('click', e => {
      e.stopPropagation();
      if (lbIndex > 0) { lbIndex--; _lbShow(); }
    });
    document.getElementById('lbNext').addEventListener('click', e => {
      e.stopPropagation();
      if (lbIndex < lbCards.length - 1) { lbIndex++; _lbShow(); }
    });

    window.addEventListener('hashchange', route);

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        if (document.getElementById('lightbox').classList.contains('open')) closeLightbox();
        else closeModal();
      }
      if (document.getElementById('lightbox').classList.contains('open')) {
        if (e.key === 'ArrowLeft' && lbIndex > 0) { lbIndex--; _lbShow(); }
        if (e.key === 'ArrowRight' && lbIndex < lbCards.length - 1) { lbIndex++; _lbShow(); }
      }
    });

    document.getElementById('mobileMenuBtn').addEventListener('click', openSidebar);
    document.getElementById('sidebarBackdrop').addEventListener('click', closeSidebar);


    // ── Search input (B1) ──────────────────────────────────────
    // isComposing: true while IME (注音/倉頡) is mid-composition; skip until confirmed
    let _searchComposing = false;
    const _searchInput = document.getElementById('searchInput');

    function _doSearch() {
      searchQuery = _searchInput.value;
      const r = getRoute();
      let episodes, title;
      if (r.type === 'channel') {
        episodes = allEpisodes.filter(ep => ep.channel_id === r.id);
        const ch = allEpisodes.find(ep => ep.channel_id === r.id);
        title = ch ? ch.channel_name : r.id;
      } else if (r.type === 'industry') {
        episodes = _getEpisodesForIndustry(r.name);
        title = `🏭 ${r.name}`;
      } else {
        episodes = allEpisodes;
        title = '全部節目';
      }
      renderEpisodes(episodes, title, r.type === 'industry' ? r.name : null);
    }

    _searchInput.addEventListener('compositionstart', () => { _searchComposing = true; });
    _searchInput.addEventListener('compositionend',   () => { _searchComposing = false; _doSearch(); });
    _searchInput.addEventListener('input', () => { if (!_searchComposing) _doSearch(); });

    // ── Article View Counter (Busuanzi JSONP) ──────────────────

    function fetchArticleViews(articleUrl) {
      return new Promise((resolve) => {
        const cbName = `_bzcb_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement('script');
        let settled = false;

        const cleanup = () => {
          settled = true;
          delete window[cbName];
          if (script.parentNode) script.parentNode.removeChild(script);
        };

        window[cbName] = (data) => {
          cleanup();
          resolve(data?.page?.pv ?? null);
        };

        const params = new URLSearchParams({
          jsonpCallback: cbName,
          t: Date.now(),
          sl: navigator.language || 'zh-TW',
          sdl: `${screen.width}x${screen.height}`,
          su: articleUrl,
        });

        script.src = `https://busuanzi.ibruce.info/busuanzi?${params}`;
        script.onerror = () => { cleanup(); resolve(null); };
        document.head.appendChild(script);

        setTimeout(() => { if (!settled) { cleanup(); resolve(null); } }, 6000);
      });
    }

    // ── Theme Toggle ───────────────────────────────────────────

    function getInitialTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') return saved;
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function applyTheme(theme) {
      if (theme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
      localStorage.setItem('theme', theme);
    }

    // Apply on load without transition flicker
    (function () {
      const theme = getInitialTheme();
      applyTheme(theme);
    })();

    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'light' ? 'dark' : 'light');
    });
  </script>
